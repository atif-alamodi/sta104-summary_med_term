// ═══════════════════════════════════════
//              QUIZ DATA (45 سؤال)
// ═══════════════════════════════════════
const quizData = [
  { q: "كم عدد وظائف علم الإحصاء الأساسية؟", o: ["3", "5", "7", "10"], c: 2, e: "7 وظائف: جمع، تنظيم، تلخيص، عرض، تحليل، تفسير، نشر" },
  { q: "هل كل المعلومات بيانات؟", o: ["نعم", "لا، ليست كل المعلومات بيانات", "فقط الأرقام", "أحياناً"], c: 1, e: "البيانات = معلومات مرتبة مدعمة بالأرقام يمكن تحليلها. ليست كل المعلومات بيانات" },
  { q: "العينة العشوائية البسيطة لا تقل عن:", o: ["10", "20", "30", "50"], c: 2, e: "يجب ألا يقل عدد أفراد العينة البسيطة عن 30 فرد" },
  { q: "حجم العينة يجب أن يكون من المجتمع:", o: ["1-2%", "2-10%", "50%", "100%"], c: 1, e: "العينة = 2% إلى 10% من حجم المجتمع" },
  { q: "الجنس (ذكر/أنثى) متغير:", o: ["كمي", "نوعي", "عشوائي", "متصل"], c: 1, e: "الجنس متغير نوعي Qualitative لأنه تصنيف وليس رقم" },
  { q: "درجة الحرارة متغير:", o: ["نوعي", "لا عشوائي", "عشوائي", "وصفي"], c: 2, e: "الحرارة متغير عشوائي Random لأنه لا يمكن التحكم به" },
  { q: "المتوسط الحسابي لـ: 10,20,30,40,50 يساوي:", o: ["25", "30", "35", "150"], c: 1, e: "x̄ = 150/5 = 30" },
  { q: "مجموع الانحرافات عن المتوسط يساوي:", o: ["1", "المتوسط", "صفر", "n"], c: 2, e: "من أهم خصائص المتوسط: Σ(xi - x̄) = 0 دائماً" },
  { q: "الوسيط لـ: 3,5,7,9,11 يساوي:", o: ["5", "7", "9", "35"], c: 1, e: "n=5 فردي، الموقع=(5+1)/2=3، القيمة الثالثة=7" },
  { q: "الوسيط لـ: 15,44,52,68,72,102 يساوي:", o: ["52", "60", "68", "44"], c: 1, e: "n=6 زوجي، القيمتان الوسطى: 52 و68، الوسيط=(52+68)/2=60" },
  { q: "أي مقياس لا يتأثر بالقيم الشاذة؟", o: ["المتوسط", "الوسيط", "المدى", "التباين"], c: 1, e: "الوسيط يعتمد على الموقع وليس القيم فلا يتأثر بالمتطرفة" },
  { q: "المنوال هو المقياس الوحيد الصالح لـ:", o: ["الكمية", "الوصفية", "المبوبة", "المتصلة"], c: 1, e: "المنوال = الوحيد الذي يمكن حسابه للبيانات الوصفية (نوعية)" },
  { q: "الفئة المنوالية في الجدول التكراري هي:", o: ["الأولى", "ذات أعلى تكرار", "ذات أقل تكرار", "الوسطى"], c: 1, e: "الفئة المنوالية = الفئة ذات أعلى تكرار" },
  { q: "متى نفضل الوسيط على المتوسط؟", o: ["دائماً", "عند وجود قيم متطرفة", "للوصفية", "أبداً"], c: 1, e: "الوسيط أفضل عند وجود قيم متطرفة لأنه لا يتأثر بها" },
  { q: "المدى لـ: 15,22,18,30,12 يساوي:", o: ["12", "15", "18", "30"], c: 2, e: "المدى = Max - Min = 30 - 12 = 18" },
  { q: "تباين العينة يُقسم على:", o: ["n", "n+1", "n-1", "2n"], c: 2, e: "s² = Σ(xi-x̄)²/(n-1) للعينة" },
  { q: "إذا التباين=25 فالانحراف المعياري:", o: ["12.5", "625", "5", "50"], c: 2, e: "s = √25 = 5" },

  { q: "Z-score تُحسب بالصيغة:", o: ["(X+x̄)/s", "(X-x̄)/s", "X×s", "x̄/s"], c: 1, e: "Z = (X - x̄) / s" },
  { q: "إذا Z=0 فالقيمة:", o: ["أكبر من المتوسط", "أصغر", "تساوي المتوسط", "شاذة"], c: 2, e: "Z=0 يعني X = x̄ أي القيمة تساوي المتوسط تماماً" },
  { q: "إذا |Z|>2 فالقيمة:", o: ["طبيعية", "=المتوسط", "متطرفة محتملة", "صفر"], c: 2, e: "|Z|>2 = متطرفة محتملة، |Z|>3 = شاذة بقوة" },
  { q: "ddof=1 في numpy يعني:", o: ["تباين المجتمع", "تباين العينة", "المتوسط", "المنوال"], c: 1, e: "ddof=1 → يقسم على n-1 (تباين العينة)" },
  { q: "الفرق بين Histogram و Bar Chart:", o: ["لا فرق", "Histogram متلاصق وBar منفصل", "العكس", "الحجم"], c: 1, e: "المدرج التكراري متلاصق (كمية متصلة)، الشريطي منفصل (نوعية)" },
  { q: "التكرار النسبي يُحسب:", o: ["تكرار×مجموع", "(تكرار÷مجموع)×100%", "مجموع÷تكرار", "تكرار-مجموع"], c: 1, e: "التكرار النسبي = (تكرار الفئة ÷ مجموع التكرارات) × 100%" },
  { q: "plt.scatter تُستخدم لرسم:", o: ["Histogram", "Bar Chart", "مخطط تشتت", "خط بياني"], c: 2, e: "scatter ترسم نقاط (مخطط التشتت)" },
  { q: "plt.barh ترسم:", o: ["شريطي رأسي", "شريطي أفقي", "مدرج تكراري", "تشتت"], c: 1, e: "barh = bar horizontal = شريطي أفقي" },
  { q: "معامل الارتباط r=0.92 يعني:", o: ["لا ارتباط", "ضعيف", "متوسط", "إيجابي قوي جداً"], c: 3, e: "0.92 > 0.8 = قوي جداً، موجب = طردي" },
  { q: "r=-0.85 يدل على:", o: ["لا ارتباط", "إيجابي قوي", "سلبي قوي جداً", "ضعيف"], c: 2, e: "|0.85| > 0.8 = قوي جداً، سالب = عكسي" },
  { q: "R² = 0.81 يعني:", o: ["ارتباط 81%", "81% من التغير مفسَّر بالنموذج", "خطأ 81%", "81 قيمة"], c: 1, e: "R² = معامل التحديد = نسبة التباين الذي يفسره النموذج" },
  { q: "في Y=a+bX، b يمثل:", o: ["نقطة التقاطع", "ميل الخط", "معامل r", "المتوسط"], c: 1, e: "b = الميل = مقدار التغير في Y لكل وحدة زيادة في X" },
  { q: "Y=59.5+3.75X عند X=7:", o: ["86.25", "85.75", "82", "63.25"], c: 1, e: "Y = 59.5 + 3.75×7 = 59.5 + 26.25 = 85.75" },
  { q: "الارتباط القوي يعني:", o: ["سببية مؤكدة", "علاقة خطية فقط", "تساوي", "لا شيء"], c: 1, e: "الارتباط لا يعني السببية! يعني وجود علاقة خطية فقط" },
  { q: "لا تتنبأ:", o: ["بقيم قريبة", "خارج نطاق البيانات الأصلية", "بالمتوسط", "بالوسيط"], c: 1, e: "التنبؤ خارج نطاق البيانات غير موثوق" },
  { q: "model.intercept_ يُعطي:", o: ["الميل", "الثابت a", "معامل r", "التباين"], c: 1, e: "intercept_ = نقطة التقاطع = الثابت a" },
  { q: "=IF(A1>=60,\"ناجح\",\"راسب\") إذا A1=45:", o: ["ناجح", "راسب", "خطأ", "0"], c: 1, e: "45<60 = الشرط خاطئ → راسب" },
  { q: "في IF المتداخلة نبدأ بالشرط:", o: ["الأصغر", "الأكبر", "أي ترتيب", "عشوائي"], c: 1, e: "نبدأ من الأكبر للأصغر لتجنب نتائج خاطئة" },
  { q: "AND تعني:", o: ["أو", "و (كل الشروط معاً)", "ليس", "أكبر"], c: 1, e: "AND = كل الشروط يجب أن تتحقق معاً" },
  { q: "OR تعني:", o: ["كل الشروط", "شرط واحد يكفي", "ليس", "يساوي"], c: 1, e: "OR = يكفي تحقق شرط واحد فقط" },
  { q: "COUNTIF تُستخدم لـ:", o: ["الجمع", "العد الشرطي", "المتوسط", "التنبؤ"], c: 1, e: "COUNTIF = عد الخلايا التي تحقق شرطاً" },
  { q: "SUMIF تختلف عن COUNTIF بأنها:", o: ["تعد", "تجمع القيم", "تحسب المتوسط", "ترسم"], c: 1, e: "SUMIF تجمع القيم، COUNTIF تعدها فقط" },
  { q: "STDEV.S تحسب:", o: ["انحراف المجتمع", "انحراف العينة", "التباين", "المتوسط"], c: 1, e: "S=Sample، STDEV.S = انحراف معياري للعينة (÷n-1)" },
  { q: "FORECAST تُستخدم لـ:", o: ["التباين", "التنبؤ بقيمة Y", "المنوال", "الرسم"], c: 1, e: "FORECAST تتنبأ بقيمة Y من معادلة الانحدار" },
  { q: "scipy.stats.linregress تُعطي:", o: ["المتوسط فقط", "الميل والثابت وr دفعة واحدة", "الرسم", "التباين"], c: 1, e: "تعطي slope, intercept, r_value, p_value, std_err" },
  { q: "في الوسيط المبوب، الفئة الوسيطية هي:", o: ["الأولى", "التي تكرارها المتجمع ≥ n/2", "الأخيرة", "أكبر تكرار"], c: 1, e: "الفئة الوسيطية = أول فئة تكرارها المتجمع الصاعد ≥ n/2" },
  { q: "النص في IF يجب وضعه بين:", o: ["أقواس", "علامات تنصيص \"\"", "نجمات", "لا شيء"], c: 1, e: "❌ IF(A1>50,ناجح) ✅ IF(A1>50,\"ناجح\")" },
];

const STA104 = function STA104() {
  const [tab, setTab] = useState("t1");
  const [answers, setAnswers] = useState({});
  const score = Object.values(answers).filter((a) => a.correct).length;

  const handleAnswer = (qi, oi) => {
    if (answers[qi] !== undefined) return;
    setAnswers((p) => ({
      ...p,
      [qi]: { selected: oi, correct: oi === quizData[qi].c },
    }));
  };
  const resetQuiz = () => setAnswers({});

  return (
    <div className="min-h-screen text-slate-200" dir="rtl" style={{background:'#0f1729',color:'#e2e8f0'}}>
      <style>{`html,body,#root{background:#0f1729!important;color:#e2e8f0!important;}`}</style>
      {/* Header */}
      <div className="bg-gradient-to-l from-[#1e3a5f] via-[#0f1729] to-[#1a1040] p-5 text-center border-b-2 border-slate-700">
        <h1 className="text-2xl font-black bg-gradient-to-l from-blue-400 to-purple-400 bg-clip-text text-transparent">
          📊 ملخص STA104 الشامل النهائي
        </h1>
        <p className="text-slate-400 text-sm mt-1">
          156 صفحة → 8 أقسام | 45 سؤال | كل صيغة + كل مثال + كل كود
        </p>
      </div>

      {/* Tabs */}
      <div className="flex overflow-x-auto bg-[#1a2440] border-b-2 border-slate-700 sticky top-0 z-50">
        {tabs.map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            className={`flex-none px-3 py-2 text-xs font-bold whitespace-nowrap border-b-3 transition-all ${
              tab === t.id
                ? "text-blue-400 border-b-2 border-blue-400 bg-blue-500/10"
                : "text-slate-500 border-b-2 border-transparent hover:text-slate-300"
            }`}
          >
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div className="max-w-3xl mx-auto p-4">
        {/* ═══════════════ المحاضرة 1 ═══════════════ */}
        {tab === "t1" && (
          <div className="space-y-1">
            <div className="bg-[#1a2440] rounded-xl p-4 border border-slate-700">
              <h2 className="text-lg font-black text-blue-400 mb-3">
                📌 الموضوع 1: مقدمة في الإحصاء + النزعة المركزية
              </h2>

              <C title="تعريف الإحصاء">
                علم جمع وتنظيم وتلخيص وعرض وتحليل البيانات والوصول إلى قرارات
                سليمة. هو فرع من فروع الرياضيات ويُعتبر الأساس في كل العلوم.
              </C>

              <H3>📋 وظائف الإحصاء السبع</H3>
              <C color="gold">
                1. جمع البيانات → 2. تنظيم وترتيب → 3. تلخيص → 4. عرض → 5.
                تحليل → 6. تفسير النتائج → 7. نشر النتائج
                <br />
                <br />
                <strong>لماذا ضروري لكل العلوم؟</strong> كل علم فيه بيانات ويحتاج
                الإحصاء لمعالجتها وتحليلها وتفسيرها.
              </C>

              <H3>📊 البيانات Data</H3>
              <C>
                <strong>التعريف:</strong> معلومات مرتبة ومنظمة ومدعمة بالأرقام
                يمكن تحليلها وتفسيرها.
                <br />
                <strong className="text-orange-400">
                  ⚠️ ليست كل المعلومات بيانات!
                </strong>
                <br />
                <br />
                <strong>المصادر:</strong> مراقبة الظواهر | إجراء التجارب | الأبحاث
                والمقابلات
                <br />
                <strong>الفوائد:</strong> تحليل ومعالجة | تفسير النتائج | الكشف عن
                الصلاحية | تقييم الأبحاث
              </C>

              <H3>🏘️ المجتمع والعينة</H3>
              <T
                headers={["", "المجتمع Population", "العينة Sample"]}
                rows={[
                  ["الرمز", "N (غالباً غير معروف)", "n (معروف)"],
                  ["المتوسط", "μ (تقديري ← مجال الثقة)", "x̄ (حسابي ← يُحسب)"],

              />

                المجتمع الإحصائي = عدد معروف من الأفراد تميزه صفات زمانية ومكانية

              <H3>📋 أنواع العينات الأربع</H3>
              <T

              <Code title="7. الانحدار + التنبؤ (sklearn)" explain="reshape(-1,1): مطلوب من sklearn | model.fit: تدريب | intercept_=a | coef_[0]=b | predict: تنبؤ">
{`X = df['ساعات'].values.reshape(-1, 1)
y = df['درجات'].values
model = LinearRegression()
model.fit(X, y)
a = model.intercept_    # الثابت (59.5)
b = model.coef_[0]      # الميل (3.75)
# التنبؤ بدرجة طالب يدرس 7 ساعات
pred = model.predict([[7]])[0]  # 85.75`}
              </Code>

              <Code title="8. معامل الارتباط (pandas)" explain=".corr() تحسب معامل بيرسون بين عمودين في DataFrame">
{`data = {'ساعات': [2,4,6,8,10], 'درجات': [65,75,85,90,95]}
df = pd.DataFrame(data)
r = df['ساعات'].corr(df['درجات'])
print(f"معامل الارتباط: {r:.3f}")  # 0.985`}
              </Code>
            </div>
          </div>
        )}

        {/* ═══════════════ دوال Excel ═══════════════ */}
        {tab === "t6" && (
          <div className="space-y-1">
            <div className="bg-[#1a2440] rounded-xl p-4 border border-slate-700">
              <h2 className="text-lg font-black text-emerald-400 mb-3">
                🧮 جميع دوال Excel المطلوبة
              </h2>

              <H3>📊 النزعة المركزية</H3>
              <T
                headers={["الدالة", "الوظيفة", "مثال"]}
                rows={[
                  ["AVERAGE", "المتوسط", "=AVERAGE(A1:A10)"],
                  ["AVERAGEIF", "متوسط بشرط", "=AVERAGEIF(B:B,\"A\",C:C)"],
                  ["AVERAGEIFS", "متوسط بعدة شروط", "=AVERAGEIFS(C:C,B:B,\"B\",C:C,\">=90\")"],
                  ["MEDIAN", "الوسيط", "=MEDIAN(A1:A10)"],
                  ["MODE.SNGL", "المنوال الوحيد", "=MODE.SNGL(A1:A10)"],
                  ["MODE.MULT", "المنوال المتعدد", "=MODE.MULT(A1:A10)"],
                ]}
              />
              <H3>📐 التشتت</H3>
              <T
                headers={["الدالة", "الوظيفة"]}
                rows={[
                  ["MAX()-MIN()", "المدى"],
                  ["VAR.S", "تباين العينة (÷n-1)"],
                  ["VAR.P", "تباين المجتمع (÷n)"],
                  ["STDEV.S", "انحراف العينة (÷n-1)"],
                  ["STDEV.P", "انحراف المجتمع (÷n)"],
                  ["(A1-B1)/C1", "القيمة المعيارية Z"],
                ]}
              />
              <Warn title="S = Sample (عينة ÷n-1) ← الأكثر استخداماً | P = Population (مجتمع ÷n)" />

              <H3>📈 الارتباط والانحدار</H3>
              <T
                headers={["الدالة", "الوظيفة"]}
                rows={[
                  ["CORREL", "معامل ارتباط بيرسون r"],
                  ["SLOPE", "ميل خط الانحدار b"],
                  ["INTERCEPT", "نقطة التقاطع a"],
                  ["FORECAST", "التنبؤ بقيمة Y"],
                ]}
              />
              <H3>🔢 العد والجمع الشرطي</H3>
              <T
                headers={["الدالة", "الوظيفة", "مثال"]}
                rows={[
                  ["COUNTIF", "عد بشرط", "=COUNTIF(B:B,\">=60\")"],
                  ["SUMIF", "جمع بشرط", "=SUMIF(A:A,\"الشرقي\",B:B)"],
                ]}
              />
            </div>
          </div>
        )}

        {/* ═══════════════ دوال IF ═══════════════ */}
        {tab === "t7" && (
          <div className="space-y-1">
            <div className="bg-[#1a2440] rounded-xl p-4 border border-slate-700">
              <h2 className="text-lg font-black text-orange-400 mb-3">
                🔀 الموضوع 6: تحليل البيانات بـ IF والدوال الشرطية
              </h2>

              <H3>🔀 IF الأساسية</H3>
              <F>=IF(الشرط, القيمة_إذا_صح, القيمة_إذا_خطأ)</F>
              <C title='✏️ مثال: =IF(A2>=60,"ناجح","راسب")' color="green">
                A2=75 → 75≥60 صحيح → <strong>ناجح</strong>
                <br />
                A2=45 → 45≥60 خطأ → <strong>راسب</strong>
              </C>

              <H3>🔀 IF المتداخلة (أكثر من خيارين)</H3>
              <F>=IF(A2≥90,"A", IF(A2≥80,"B", IF(A2≥70,"C", IF(A2≥60,"D","F"))))</F>
              <Warn title="قاعدة حاسمة: الترتيب من الأكبر للأصغر!">
                ❌ IF(A2≥60,"D", IF(A2≥90,"A",...)) ← كل الدرجات العالية ستحصل على D!
                <br />
                ✅ IF(A2≥90,"A", IF(A2≥60,"D",...)) ← نبدأ من الأكبر
              </Warn>

              <H3>🔀 حساب العمولة (IF متداخلة)</H3>
              <C title="أقل من 5000=5% | 5000-10000=7% | أكثر=10%" color="green">
                <EF>=IF(B2&lt;5000, B2*0.05, IF(B2&lt;10000, B2*0.07, B2*0.1))</EF>
                <br /><br />
                4500→225ر | 7800→546ر | 12000→1200ر
              </C>

              <H3>🔗 IF + AND (كل الشروط معاً)</H3>
              <F>=IF(AND(شرط1, شرط2), صح, خطأ)</F>
              <C title='✏️ قبول: معدل≥3 و إنجليزي≥500' color="green">
                <EF>=IF(AND(B2≥3, C2≥500), "مقبول", "غير مقبول")</EF>
                <br /><br />
                معدل 3.5 + إنجليزي 550 → مقبول ✅ | معدل 2.8 + إنجليزي 600 → غير مقبول ❌
              </C>

              <H3>🔗 IF + OR (شرط واحد يكفي)</H3>
              <F>=IF(OR(شرط1, شرط2), صح, خطأ)</F>
              <C title='✏️ خصم 15% إذا عميل مميز أو مشتريات≥5000' color="green">
                <EF>=IF(OR(C2="نعم", B2≥5000), B2*0.15, 0)</EF>
              </C>

              <H3>🔗 دمج AND و OR معاً</H3>
              <C title='✏️ منحة: (معدل≥3.5 و دخل<3000) أو (معدل≥3.8)' color="green">
                <EF>=IF(OR(AND(B2≥3.5, C2&lt;3000), B2≥3.8), "يستحق", "لا")</EF>
              </C>

              <H3>📋 عوامل المقارنة</H3>
              <T
                headers={["العامل", "المعنى"]}
                rows={[["=","يساوي"],[">","أكبر من"],["<","أصغر من"],[">=","أكبر أو يساوي"],["<=","أصغر أو يساوي"],["<>","لا يساوي"]]}
              />

              <Warn title="أخطاء شائعة تجنبها!">
                ❌ نسيان علامات التنصيص: IF(A1&gt;50,ناجح) → ✅ IF(A1&gt;50,"ناجح")
                <br />
                ❌ ترتيب خاطئ في IF المتداخلة (ابدأ من الأكبر!)
                <br />
                ❌ نسيان إغلاق الأقواس (كل قوس ( يجب أن يُغلق ))
                <br />❌ نسيان الفاصلة بين أجزاء الدالة
              </Warn>
            </div>
          </div>
        )}

        {/* ═══════════════ الاختبار ═══════════════ */}
        {tab === "quiz" && (
          <div className="space-y-3">
            <div className="bg-[#1a2440] rounded-xl p-4 border border-slate-700 text-center">
              <div className="text-3xl font-black bg-gradient-to-l from-yellow-400 to-orange-400 bg-clip-text text-transparent">
                {score} / {quizData.length}
              </div>
              <button
                onClick={resetQuiz}
                className="mt-2 px-4 py-1.5 bg-red-500/15 text-red-400 border border-red-500/30 rounded-lg text-sm font-bold"
              >
                🔄 إعادة
              </button>
            </div>

            {quizData.map((q, qi) => (
              <div
                key={qi}
                className="bg-[#1a2440] rounded-xl p-3 border border-slate-700"
              >
                <div className="text-blue-400 font-bold text-sm mb-2">
                  س{qi + 1}: {q.q}
                </div>
                <div className="space-y-1.5">
                  {q.o.map((o, oi) => {
                    const a = answers[qi];
                    let cls =
                      "p-2 border rounded-lg text-sm cursor-pointer transition-all ";
                    if (a) {
                      if (oi === q.c)
                        cls +=
                          "border-emerald-500 bg-emerald-500/10 text-emerald-400";
                      else if (oi === a.selected && !a.correct)
                        cls += "border-red-500 bg-red-500/10 text-red-400";
                      else cls += "border-slate-700 text-slate-500";
                    } else {
                      cls +=
                        "border-slate-700 text-slate-300 hover:border-blue-500 hover:bg-blue-500/5";
                    }
                    return (
                      <div
                        key={oi}
                        className={cls}
                        onClick={() => handleAnswer(qi, oi)}
                      >
                        {o}
                      </div>
                    );
                  })}
                </div>
                {answers[qi] && (
                  <div
                    className={`mt-2 p-2 rounded-lg text-xs ${
                      answers[qi].correct
                        ? "bg-emerald-500/10 border border-emerald-500/20 text-emerald-400"
                        : "bg-red-500/10 border border-red-500/20 text-red-300"
                    }`}
                  >
                    {answers[qi].correct ? "✅" : "❌"} {q.e}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

ReactDOM.render(<STA104 />, document.getElementById('root'));
</script>
</body>
</html>
