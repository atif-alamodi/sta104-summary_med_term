<h2 style="color:#34d399">🤖 Module 2: Generative AI + Present Simple</h2>

<h3>📖 المفردات - Vocabulary</h3>
<div class="cb y"><div class="lb yl">طريقة حفظ المفردات: اقرأ المعنى بالإنجليزي أولاً (English-English) ثم الترجمة العربية</div>
لماذا؟ لأن الاختبار بالإنجليزي! إذا حفظت المعنى بالإنجليزي مباشرة ستفهم السؤال أسرع.</div>

<div class="tw"><table>
<tr><th>Word</th><th>English Meaning</th><th>المعنى بالعربي</th><th>Example</th></tr>

<tr><td><b>Data</b></td><td>Information in numbers or text</td><td>بيانات (معلومات رقمية)</td><td class="en">The system uses data to learn.</td></tr>
<tr><td><b>Program</b></td><td>A set of instructions for a computer</td><td>برنامج حاسوبي</td><td class="en">This program runs fast.</td></tr>
<tr><td><b>System</b></td><td>A group of parts working together</td><td>نظام</td><td class="en">The system processes data.</td></tr>
<tr><td><b>Tool</b></td><td>Something used to do a job</td><td>أداة</td><td class="en">AI is a useful tool.</td></tr>
<tr><td><b>Generate</b></td><td>To create something new</td><td>يُنشئ / يُولّد</td><td class="en">The AI generates a summary.</td></tr>
<tr><td><b>Prompt</b></td><td>A message typed by the user to AI</td><td>أمر / طلب يُكتب للذكاء الاصطناعي</td><td class="en">Write a clear prompt.</td></tr>
<tr><td><b>Output</b></td><td>What the AI produces as a result</td><td>المخرجات / النتيجة</td><td class="en">The output is a short text.</td></tr>
<tr><td><b>Recognize</b></td><td>To identify or know something</td><td>يتعرّف على</td><td class="en">The app recognizes my face.</td></tr>
<tr><td><b>Identify</b></td><td>To find out what something is</td><td>يُحدد / يتعرف</td><td class="en">AI can identify errors.</td></tr>

<div class="ez">الـ Prompt مثل لما تكتب طلب في ChatGPT ← هذا هو الـ prompt. والـ Output هو الرد اللي يطلع لك. والـ Generate يعني "ينتج شيء جديد" مثل لما AI يكتب لك نص أو يرسم صورة.</div>

<h3>📗 القواعد - Grammar: Present Simple المضارع البسيط</h3>
<div class="cb"><div class="lb bl">🎯 متى نستخدمه؟ (بالعربي)</div>
نستخدم المضارع البسيط لوصف:<br>
1. <b>حقائق ثابتة:</b> AI generates answers. (الذكاء الاصطناعي يُنشئ إجابات)<br>
2. <b>عمليات وأنظمة:</b> The system uses data. (النظام يستخدم بيانات)<br>
3. <b>روتين يومي:</b> Students use apps every day. (الطلاب يستخدمون التطبيقات يومياً)</div>

<div class="warn"><div class="wt">⚠️ القاعدة الذهبية</div>
<b>مع he / she / it ← نضيف s أو es للفعل</b><br>
<b>مع I / you / we / they ← الفعل يبقى كما هو</b></div>

<div class="fm">Affirmative (الإثبات): Subject + verb (+s/es)<small>AI generate<b>s</b> answers. ← لاحظ الـ s لأن AI = it</small></div>
<div class="fm">Negative (النفي): Subject + do/does not + base verb<small>AI does not replace teachers. ← does not لأن AI = it<br>Chatbots do not understand feelings. ← do not لأن Chatbots = they</small></div>
<div class="fm">Yes/No Questions: Do/Does + subject + base verb?<small>Does AI help students? ← Yes, it does. / No, it doesn't.<br>Do chatbots answer questions? ← Yes, they do. / No, they don't.</small></div>
<div class="fm">WH-Questions: WH-word + do/does + subject + base verb?<small>What does the model generate? ← ماذا ينتج النموذج؟<br>Why does AI recommend videos? ← لماذا يوصي AI بفيديوهات؟</small></div>

<div class="cb g"><div class="lb gr">✏️ أمثلة شاملة - Present Simple Examples</div>
<div class="tw"><table>
<tr><th></th><th>he / she / it</th><th>I / you / we / they</th></tr>
<tr><td><b>✅ Affirmative</b></td><td class="en">The app <b>recognizes</b> my voice.<br>AI <b>generates</b> text.<br>The system <b>uses</b> data.<br>The chatbot <b>helps</b> students.</td><td class="en">Students <b>use</b> apps daily.<br>We <b>write</b> prompts.<br>They <b>generate</b> reports.<br>Chatbots <b>answer</b> questions.</td></tr>
<tr><td><b>❌ Negative</b></td><td class="en">AI <b>doesn't replace</b> teachers.<br>The system <b>doesn't understand</b> feelings.<br>It <b>doesn't work</b> offline.</td><td class="en">Students <b>don't use</b> AI for cooking.<br>We <b>don't trust</b> all outputs.<br>They <b>don't generate</b> perfect answers.</td></tr>
<tr><td><b>❓ Yes/No Q</b></td><td class="en"><b>Does</b> AI <b>help</b> students? Yes, it does.<br><b>Does</b> the app <b>recognize</b> faces? No, it doesn't.</td><td class="en"><b>Do</b> students <b>use</b> ChatGPT? Yes, they do.<br><b>Do</b> chatbots <b>make</b> mistakes? Yes, they do.</td></tr>
<tr><td><b>🔍 WH- Q</b></td><td class="en"><b>What does</b> AI <b>generate</b>?<br><b>How does</b> the system <b>work</b>?<br><b>Why does</b> AI <b>recommend</b> videos?</td><td class="en"><b>What do</b> students <b>use</b>?<br><b>How do</b> chatbots <b>learn</b>?<br><b>Why do</b> they <b>need</b> AI?</td></tr>
</table></div></div>

<div class="ez">المضارع البسيط مثل "الشيء اللي يصير دائماً". مثل: "الشمس تطلع كل يوم" ← The sun rises every day. لاحظ rises فيها s لأن the sun = it.<br><br>
<b>حيلة سهلة:</b><br>
he/she/it ← أضف <b>s</b> (أو <b>es</b> إذا الفعل ينتهي بـ s, sh, ch, x, o)<br>
I/you/we/they ← الفعل زي ما هو بدون أي إضافة<br><br>
<b>النفي:</b> حط does not (أو doesn't) قبل الفعل مع he/she/it، وdo not (أو don't) مع الباقي. <b>والفعل يرجع بدون s!</b><br>
AI generate<b>s</b> ← ✅ إثبات<br>
AI <b>does not</b> generate ← ✅ نفي (بدون s!)</div>

<h3>📖 قطعة القراءة 1 - Reading Passage 1</h3>
<div class="enb"><div class="et">📖 Generative AI in Everyday Life</div>
Generative AI is becoming a normal part of modern life. Many people use tools like ChatGPT or Google Gemini every day. Students can write a simple prompt and the AI generates a short explanation.<br><br>
Translation apps help learners understand new words. Some apps summarize long texts and create easier versions. Creative apps allow users to generate images, short stories, or designs by typing a few words.<br><br>
Music and video platforms use AI to recommend songs and clips based on preferences. Generative AI helps students by identifying writing problems, creating study plans, and answering questions. Although AI makes mistakes, it improves over time.</div>
<div class="ez">القطعة تتكلم عن إن AI صار شيء عادي في حياتنا: الطلاب يكتبون prompt ويحصلون شرح، تطبيقات الترجمة تساعد في فهم كلمات جديدة، تطبيقات إبداعية تنشئ صور وقصص، ومنصات الموسيقى تستخدم AI لتوصية أغاني. AI يساعد الطلاب لكن <b>يخطئ أحياناً</b>.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Comprehension (الإجابات بالعربي)</div>
<div class="en" style="margin-bottom:.3rem"><b>1. Generative AI helps students by:</b> A) cooking food B) <span class="hl3">explaining ideas ✅</span> C) driving cars</div>
<div style="color:#94a3b8;font-size:.78rem">الشرح: القطعة تقول AI يساعد الطلاب بتوضيح الأفكار وإنشاء خطط دراسية</div>
<div class="en" style="margin-bottom:.3rem"><b>2. Creative apps can create:</b> A) animals B) <span class="hl3">designs and images ✅</span> C) food recipes only</div>
<div style="color:#94a3b8;font-size:.78rem">الشرح: "Creative apps allow users to generate images, short stories, or designs"</div>
<div class="en" style="margin-bottom:.3rem"><b>3. Translation apps help students with:</b> A) <span class="hl3">new words and sentences ✅</span> B) weather C) music</div>
<div style="color:#94a3b8;font-size:.78rem">الشرح: "Translation apps help learners understand new words or sentences"</div>
<div class="en" style="margin-bottom:.3rem"><b>4. AI sometimes makes:</b> A) money B) <span class="hl3">mistakes ✅</span> C) videos</div>
<div style="color:#94a3b8;font-size:.78rem">الشرح: "Although AI makes mistakes" ← AI يخطئ أحياناً</div>
<div class="en" style="margin-bottom:.3rem"><b>5. Music apps use AI to:</b> A) <span class="hl3">recommend songs ✅</span> B) cook meals C) clean files</div>
<div style="color:#94a3b8;font-size:.78rem">الشرح: "Music platforms use AI to recommend songs and clips"</div>
</div>

<h3>📖 قطعة القراءة 2 - Reading Passage 2</h3>
<div class="enb"><div class="et">📖 Generative AI at School and Work</div>
Generative AI is an essential tool for students and workers. Students use AI models like ChatGPT to understand difficult ideas, request summaries, or get clear examples. AI writing tools check grammar and suggest better vocabulary.<br><br>
Teachers use AI platforms to check homework automatically and to identify students who need extra support. In workplaces, AI writes simple emails, translates messages, and creates short reports. Chatbots answer common questions and guide customers.<br><br>
AI can misunderstand prompts or generate incorrect information. Users must review AI output before using it. When used responsibly, generative AI improves learning and productivity.</div>

<div class="cb g"><div class="lb gr">True or False (صح أو خطأ)</div>
<div class="en"><b>1. Students use AI to understand difficult ideas.</b> → <span class="hl3">True ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">صح: "Students use AI models to understand difficult ideas"</div>
<div class="en"><b>2. AI cannot check grammar.</b> → <span style="color:#ef4444">False ❌</span></div>
<div style="color:#94a3b8;font-size:.78rem">خطأ: "AI writing tools check grammar" ← AI يقدر يتحقق من القواعد</div>
<div class="en"><b>3. Teachers use AI to help identify students who need support.</b> → <span class="hl3">True ✅</span></div>
<div class="en"><b>4. AI writes emails at work.</b> → <span class="hl3">True ✅</span></div>
<div class="en"><b>5. AI is always correct.</b> → <span style="color:#ef4444">False ❌</span></div>
<div style="color:#94a3b8;font-size:.78rem">خطأ: "AI can misunderstand prompts or generate incorrect information" ← AI يخطئ!</div>
</div>

<h3>✏️ تمارين القواعد - Grammar Practice</h3>
<div class="cb g"><div class="lb gr">Exercise 1: Fill in the blanks (من المنهج)</div>
<div class="en">1. ChatGPT <b>generates</b> explanations. <span style="color:#94a3b8">(he/she/it ← +s)</span></div>

<div class="en">5. Why <b>does</b> AI recommend videos? <span style="color:#94a3b8">(WH + does)</span></div>
<div class="en">6. What <b>does</b> the model generate? <span style="color:#94a3b8">(WH + does + base verb)</span></div>
</div>

<div class="cb g"><div class="lb gr">Exercise 2: Correct the sentences (صحح الجمل)</div>

<div class="en">2. The system not use data. → <span class="hl3">The system <b>does not use</b> data. ✅</span></div>
<div class="en">3. Chatbots understand feelings. → (negative) <span class="hl3">Chatbots <b>do not</b> understand feelings. ✅</span></div>

</div>

<div class="en">2. The system uses data. → <span class="hl3"><b>Does</b> the system <b>use</b> data? ✅</span></div>
<div class="en">3. Students use apps. → <span class="hl3"><b>Do</b> students <b>use</b> apps? ✅</span> <span style="color:#94a3b8">(they ← Do)</span></div>
<div class="en">4. Chatbots help with writing. → <span class="hl3"><b>Do</b> chatbots <b>help</b> with writing? ✅</span></div>

<h3>📖 قصة خالد - A Day Using Generative AI</h3>
<div class="enb"><div class="et">📖 A Day Using Generative AI (Khalid's Story)</div>
My name is Khalid, and I use generative AI many times during the day. In the morning, my smart watch wakes me up and shows me a sleep report. After breakfast, I write a prompt such as "Explain neural networks in easy English."<br><br>
At college, I use a chatbot to practice vocabulary. It recognizes my mistakes and gives me better sentences. During lunch, I ask ChatGPT to summarize a passage from my programming class.<br><br>
In the library, I use AI to check my writing and create study notes. When I am confused, I ask for definitions. Before I sleep, my phone creates a study plan for the next day.</div>
<div class="ez">خالد يستخدم AI طول اليوم: الساعة الذكية توقظه وتعطيه تقرير نوم، يكتب prompt عن الشبكات العصبية، يستخدم chatbot لممارسة المفردات، يطلب من ChatGPT تلخيص درس البرمجة، ويستخدم AI لتدقيق كتابته. قبل النوم جواله يسوي له خطة دراسية!</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Comprehension</div>
<div class="en"><b>1. What wakes Khalid up?</b> A) His phone B) <span class="hl3">His smart watch ✅</span> C) His mother</div>

</div>

</div>`;

sections.m3=`<div class="card">
<h2 style="color:#38bdf8">💻 Module 3: Technical Reading + Passive Voice</h2>

<h3>📖 المفردات - Vocabulary</h3>
<div class="tw"><table>
<tr><th>Word</th><th>English Meaning</th><th>المعنى بالعربي</th><th>Example</th></tr>
<tr><td><b>Device</b></td><td>A piece of electronic equipment</td><td>جهاز</td><td class="en">This device connects via Wi-Fi.</td></tr>
<tr><td><b>System</b></td><td>A set of connected parts working together</td><td>نظام</td><td class="en">The system manages all devices.</td></tr>
<tr><td><b>Feature</b></td><td>A special quality or ability</td><td>ميزة / خاصية</td><td class="en">The new feature improves storage.</td></tr>
<tr><td><b>Storage</b></td><td>The space where data is kept (memory)</td><td>تخزين / مساحة التخزين</td><td class="en">Check your storage space.</td></tr>
<tr><td><b>Update</b></td><td>A newer version of software</td><td>تحديث</td><td class="en">Install the latest update.</td></tr>
<tr><td><b>Configure</b></td><td>To set up a device or system</td><td>يُهيئ / يُعدّ (الإعدادات)</td><td class="en">Configure your device before use.</td></tr>
<tr><td><b>Interface</b></td><td>The screen/controls users interact with</td><td>واجهة المستخدم</td><td class="en">The interface is user-friendly.</td></tr>
<tr><td><b>Function</b></td><td>What something does; its purpose</td><td>وظيفة</td><td class="en">The main function is data analysis.</td></tr>
<tr><td><b>Version</b></td><td>A particular form of software (v1, v2...)</td><td>إصدار / نسخة</td><td class="en">Check the version after the update.</td></tr>
<tr><td><b>Performance</b></td><td>How well something works</td><td>أداء</td><td class="en">The update improves performance.</td></tr>
</table></div>
<div class="ez">Configure = تظبط الإعدادات (مثل لما تشتري جوال جديد وتضبط اللغة والواي فاي). Interface = الشاشة اللي تتعامل معها (مثل شاشة الجوال). Version = النسخة (مثل iOS 17 ← هذا version). Performance = الأداء (سرعة الجهاز وقوته).</div>

<h3>📗 القواعد - Grammar: Passive Voice المبني للمجهول</h3>
<div class="cb"><div class="lb bl">🎯 متى نستخدمه؟ (بالعربي)</div>
نستخدم المبني للمجهول عندما <b>الفاعل غير مهم أو غير معروف</b>، والمهم هو <b>الفعل نفسه أو المفعول به</b>.<br><br>
<b>مثال:</b> "التحديثات تُثبّت تلقائياً" ← ما يهمنا مَن ثبّتها، المهم إنها تُثبّت.</div>

<div class="fm">Passive Voice: Object + is/are + past participle (التصريف الثالث)<small>
Updates <b>are installed</b> automatically. ← التحديثات تُثبّت تلقائياً<br>
Data <b>is stored</b> in the cloud. ← البيانات تُخزّن في السحابة<br>
Errors <b>are detected</b> by the system. ← الأخطاء تُكتشف بواسطة النظام</small></div>

<div class="warn"><div class="wt">⚠️ القاعدة: كيف نحوّل من Active إلى Passive؟</div>
<b>Active:</b> The system processes the data. ← النظام يعالج البيانات (فاعل + فعل + مفعول)<br>
<b>Passive:</b> The data <b>is processed</b> (by the system). ← البيانات تُعالَج<br><br>
<b>الخطوات:</b><br>
1. المفعول به يصير في البداية (The data)<br>
2. نضيف is/are حسب المفرد أو الجمع<br>
3. نحول الفعل للتصريف الثالث (process → processed)<br>
4. الفاعل نحطه بعد by (اختياري)</div>

<div class="ez">المبني للمجهول = "الشيء انسوى لوحده!" بدل ما تقول "أحمد كسر الكأس" ← تقول "الكأس انكسر" (ما يهمك مين كسره).<br>
<b>is + التصريف الثالث</b> ← للمفرد (Data <b>is stored</b>)<br>
<b>are + التصريف الثالث</b> ← للجمع (Updates <b>are installed</b>)</div>

<div class="cb g"><div class="lb gr">✏️ أمثلة إضافية - More Passive Examples</div>
<div class="tw"><table>
<tr><th>Singular (مفرد) → is + V3</th><th>Plural (جمع) → are + V3</th></tr>
<tr><td class="en">Data <b>is stored</b> in the cloud.</td><td class="en">Files <b>are stored</b> in the cloud.</td></tr>
<tr><td class="en">The update <b>is installed</b> automatically.</td><td class="en">Updates <b>are installed</b> automatically.</td></tr>
<tr><td class="en">The error <b>is detected</b> by the system.</td><td class="en">Errors <b>are detected</b> by the system.</td></tr>
<tr><td class="en">The issue <b>is fixed</b> by the technician.</td><td class="en">Problems <b>are fixed</b> quickly.</td></tr>
<tr><td class="en">The device <b>is connected</b> to Wi-Fi.</td><td class="en">Devices <b>are connected</b> to the hub.</td></tr>
<tr><td class="en">The app <b>is downloaded</b> from the store.</td><td class="en">Apps <b>are downloaded</b> from the store.</td></tr>
<tr><td class="en">The password <b>is encrypted</b>.</td><td class="en">Passwords <b>are encrypted</b> for security.</td></tr>
</table></div></div>

<div class="cb g"><div class="lb gr">✏️ تمارين محلولة - حوّل من Active إلى Passive</div>
<div class="en"><b>1.</b> The system processes the data. → <span class="hl3">The data is processed by the system.</span></div>
<div style="color:#94a3b8;font-size:.78rem">data مفرد ← is + processed (التصريف الثالث لـ process)</div>
<div class="en"><b>2.</b> The OS manages network settings. → <span class="hl3">Network settings are managed by the OS.</span></div>
<div style="color:#94a3b8;font-size:.78rem">settings جمع ← are + managed</div>
<div class="en"><b>3.</b> The app stores files in the cloud. → <span class="hl3">Files are stored in the cloud by the app.</span></div>
<div class="en"><b>4.</b> The technician fixes the issue. → <span class="hl3">The issue is fixed by the technician.</span></div>
</div>

<h3>📖 قطعة القراءة - Smart Home Systems</h3>
<div class="enb"><div class="et">📖 How Modern Smart Home Systems Operate</div>
A smart home system integrates multiple devices to create a connected environment. The hub acts as the "brain" of the home. When a sensor detects motion, it sends a signal to the hub. The hub processes that information and sends commands to devices.<br><br>
Smart thermostats track when family members are home and adjust temperatures. Smart plugs and meters record electricity usage. Remote access allows users to control their home from anywhere. All data is encrypted and stored securely in cloud servers.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Comprehension</div>
<div class="en"><b>1. The "brain" of the smart home is:</b> A) sensor B) <span class="hl3">central hub ✅</span> C) camera</div>
<div style="color:#94a3b8;font-size:.78rem">"دماغ" البيت الذكي = الـ hub (المحور المركزي) اللي يتحكم بكل الأجهزة</div>
<div class="en"><b>2. Smart thermostats help with:</b> A) entertainment B) <span class="hl3">temperature control ✅</span> C) door locking</div>
<div style="color:#94a3b8;font-size:.78rem">الثيرموستات الذكي يتحكم بدرجة الحرارة</div>
<div class="en"><b>3. Why are updates important?</b> A) Entertainment B) <span class="hl3">Fix security issues ✅</span> C) Change colors</div>
<div style="color:#94a3b8;font-size:.78rem">التحديثات مهمة لأنها تصلح مشاكل الأمان وتحسّن الأداء</div>
</div>

<h3>📖 قطعة القراءة 2 - Mobile Operating System</h3>
<div class="enb"><div class="et">📖 Inside a Mobile Operating System</div>
A mobile operating system (OS) is the core software that manages every function of a smartphone. One major task is resource management: when an app opens, the OS allocates memory and determines how much processing power it receives. It prioritizes apps based on importance - navigation apps receive higher priority than games.<br><br>
Another function is storage management. The OS organizes files, clears cache, and deletes temporary files. When storage becomes low, the OS warns the user.<br><br>
Connectivity is controlled by the OS - it manages Wi-Fi, mobile data, and Bluetooth, and switches networks automatically when a signal becomes weak. Security is one of the OS's strongest responsibilities: it scans for suspicious files, isolates threats, and prevents malicious apps from accessing sensitive information.<br><br>
Modern phones use permission systems allowing users to control app access to camera, microphone, location, and contacts. System updates introduce new features, improve speed, and fix bugs.</div>
<div class="ez">نظام التشغيل (مثل Android أو iOS) هو "المدير" اللي يتحكم بكل شيء في جوالك: يوزع الذاكرة على التطبيقات، يدير التخزين، يتحكم بالواي فاي والبلوتوث، ويحمي جهازك من الفيروسات. التحديثات مهمة جداً لأنها تصلح مشاكل الأمان!</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Reading 2 MCQs</div>
<div class="en"><b>1. What does the OS allocate when an app runs?</b> A) Colors B) <span class="hl3">Memory ✅</span> C) Battery</div>
<div style="color:#94a3b8;font-size:.78rem">لما تفتح تطبيق، النظام يخصص له ذاكرة (memory)</div>
<div class="en"><b>2. What happens when storage is nearly full?</b> A) <span class="hl3">OS warns user ✅</span> B) Device shuts down C) OS deletes everything</div>
<div style="color:#94a3b8;font-size:.78rem">لما التخزين يمتلئ، النظام ينبّه المستخدم (warns)</div>
<div class="en"><b>3. Why does the OS switch networks automatically?</b> A) Fun B) <span class="hl3">Weak signal ✅</span> C) Update apps</div>
<div style="color:#94a3b8;font-size:.78rem">يبدل الشبكات تلقائياً عشان الإشارة ضعيفة</div>
<div class="en"><b>4. What is the function of app permissions?</b></div>
<div style="color:#94a3b8;font-size:.78rem">← الصلاحيات تسمح للمستخدم يتحكم أي تطبيق يقدر يوصل للكاميرا والموقع وجهات الاتصال = حماية الخصوصية</div>
<div class="en"><b>5. Why are updates important for security?</b></div>
<div style="color:#94a3b8;font-size:.78rem">← التحديثات تصلح الثغرات الأمنية وتكتشف تهديدات جديدة: "Updates fix bugs, improve security, and enhance performance"</div>
</div>

</div>`;

sections.m4=`<div class="card">
<h2 style="color:#fb923c">📝 Module 4: Technical Descriptions + Adjectives</h2>

<h3>📖 المفردات - Vocabulary</h3>
<h3 style="color:#38bdf8;font-size:.85rem">Descriptive Nouns (أسماء وصفية)</h3>
<div class="vw">
<div class="vi"><b>Model</b> = a specific version of a product<div class="ar">طراز / موديل</div></div>
<div class="vi"><b>Type</b> = a category or kind<div class="ar">نوع / صنف</div></div>
<div class="vi"><b>Size</b> = how big or small something is<div class="ar">حجم</div></div>
<div class="vi"><b>Weight</b> = how heavy something is<div class="ar">وزن</div></div>
<div class="vi"><b>Material</b> = what something is made of<div class="ar">مادة (الخامة)</div></div>
</div>

<h3 style="color:#38bdf8;font-size:.85rem">Functional Verbs (أفعال وظيفية)</h3>
<div class="vw">
<div class="vi"><b>Include</b> = to contain as part<div class="ar">يتضمن / يشمل</div></div>
<div class="vi"><b>Allow</b> = to let someone do something<div class="ar">يسمح</div></div>
<div class="vi"><b>Support</b> = to help or work with<div class="ar">يدعم</div></div>
<div class="vi"><b>Provide</b> = to give or offer<div class="ar">يوفّر / يقدّم</div></div>
<div class="vi"><b>Operate</b> = to work or function<div class="ar">يعمل / يُشغّل</div></div>
</div>

<h3 style="color:#38bdf8;font-size:.85rem">Descriptive Phrases (عبارات وصفية) ⭐</h3>
<div class="tw"><table>
<tr><th>Phrase</th><th>English Meaning</th><th>المعنى بالعربي</th><th>Example</th></tr>
<tr><td><b>designed for</b></td><td>created for a specific purpose</td><td>مصمم لـ</td><td class="en">designed for professional use</td></tr>
<tr><td><b>suitable for</b></td><td>appropriate or good for</td><td>مناسب لـ</td><td class="en">suitable for daily tasks</td></tr>
<tr><td><b>equipped with</b></td><td>has or contains</td><td>مجهّز بـ</td><td class="en">equipped with advanced features</td></tr>
<tr><td><b>available in</b></td><td>can be found in (sizes, colors)</td><td>متوفر بـ</td><td class="en">available in different sizes</td></tr>
<tr><td><b>compatible with</b></td><td>able to work with other devices</td><td>متوافق مع</td><td class="en">compatible with most smartphones</td></tr>
</table></div>

<h3 style="color:#38bdf8;font-size:.85rem">Technical Adjectives (صفات تقنية)</h3>
<div class="vw">
<div class="vi"><b>Compact</b> = small and easy to carry<div class="ar">صغير الحجم</div></div>
<div class="vi"><b>Durable</b> = strong and long-lasting<div class="ar">متين / يتحمل</div></div>
<div class="vi"><b>Efficient</b> = works well without waste<div class="ar">فعّال / كفؤ</div></div>
<div class="vi"><b>Portable</b> = easy to carry around<div class="ar">محمول / سهل النقل</div></div>
<div class="vi"><b>Reliable</b> = can be trusted; works well<div class="ar">موثوق / يُعتمد عليه</div></div>
</div>
<div class="ez">Compact = صغير تقدر تحطه في جيبك. Durable = ما ينكسر بسهولة (متين). Efficient = يسوي الشغل بأقل جهد. Portable = تقدر تاخذه معك وين ما رحت. Reliable = تقدر تعتمد عليه 100%.</div>

<h3>📗 القواعد - Adjectives before Nouns الصفة قبل الاسم</h3>
<div class="fm">In English: adjective comes BEFORE the noun<small>
a <b>compact</b> model ✅ ← صح (الصفة قبل الاسم)<br>
a model <b>compact</b> ❌ ← خطأ! (في العربي الصفة بعد الاسم، لكن في الإنجليزي العكس!)</small></div>
<div class="ez">في العربي نقول "جهاز صغير" (الاسم أولاً ثم الصفة). لكن في الإنجليزي العكس: "small device" (الصفة أولاً ثم الاسم). <b>دائماً الصفة قبل الاسم في الإنجليزي!</b></div>

<div class="cb g"><div class="lb gr">✏️ أمثلة - Adjectives Before Nouns</div>
<div class="tw"><table>
<tr><th>✅ Correct (adjective + noun)</th><th>❌ Wrong</th></tr>
<tr><td class="en">a <b>compact</b> model</td><td class="en">a model compact ❌</td></tr>
<tr><td class="en">a <b>durable</b> material</td><td class="en">a material durable ❌</td></tr>
<tr><td class="en">a <b>portable</b> device</td><td class="en">a device portable ❌</td></tr>
<tr><td class="en">an <b>efficient</b> system</td><td class="en">a system efficient ❌</td></tr>
<tr><td class="en">a <b>reliable</b> platform</td><td class="en">a platform reliable ❌</td></tr>
<tr><td class="en">a <b>lightweight</b> wearable</td><td class="en">a wearable lightweight ❌</td></tr>
</table></div>
<b>Descriptive Phrases (بعد الاسم):</b><br>
<div class="en">• a device <b>designed for</b> daily use<br>
• a system <b>equipped with</b> sensors<br>
• a model <b>compatible with</b> smartphones<br>
• a platform <b>suitable for</b> students<br>
• a product <b>available in</b> different sizes</div>
</div>

<div class="cb g"><div class="lb gr">✏️ تمارين محلولة</div>
<div class="en"><b>1.</b> Choose: A) model compact B) <span class="hl3">compact model ✅</span> C) compactly model</div>
<div style="color:#94a3b8;font-size:.78rem">الصفة compact تجي قبل الاسم model</div>
<div class="en"><b>2.</b> The device is designed _____ daily use. → <span class="hl3">for ✅</span> (designed for = مصمم لـ)</div>
<div class="en"><b>3.</b> Choose: A) <span class="hl3">It is a portable and reliable system. ✅</span> B) portable and reliability system</div>
<div style="color:#94a3b8;font-size:.78rem">portable و reliable كلهم صفات (adjectives). لكن reliability اسم (noun) فما تصلح هنا.</div>
</div>

<h3>📖 قطعة القراءة 1 - Smart Wearable Device</h3>
<div class="enb"><div class="et">📖 Smart Wearable Device</div>
This smart wearable device is a compact and portable model designed for daily personal use. It is lightweight and made of durable materials that allow it to withstand regular movement and outdoor conditions. The device is available in different sizes to fit various users comfortably.<br><br>
The wearable includes multiple built-in sensors that monitor physical activity and basic health data. It supports step tracking, heart rate monitoring, and sleep analysis. The device operates automatically once it is connected to a mobile application. It allows users to view their data in real time and review daily summaries.<br><br>
This model is designed for users who want simple and reliable performance. It is compatible with most modern smartphones and operates efficiently throughout the day with minimal charging.</div>
<div class="ez">جهاز ذكي قابل للارتداء (مثل ساعة ذكية): صغير وخفيف ومتين، يتتبع خطواتك ونبضات قلبك ونومك. يتصل بتطبيق جوالك ويعرض بياناتك لحظياً. متوافق مع أغلب الجوالات الحديثة وبطاريته تكفي طول اليوم.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Reading 1 MCQs</div>
<div class="en"><b>1. What is the main purpose?</b> A) Entertainment B) <span class="hl3">Monitoring daily activity ✅</span> C) Software development</div>
<div style="color:#94a3b8;font-size:.78rem">الغرض الرئيسي = مراقبة النشاط اليومي (خطوات + نبض + نوم)</div>
<div class="en"><b>2. Which adjective best describes the design?</b> A) Heavy B) Complex C) <span class="hl3">Portable ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">portable = محمول وسهل الحمل (compact and portable)</div>
<div class="en"><b>3. What allows users to view their data?</b> A) External software B) Desktop C) <span class="hl3">A connected mobile application ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">"operates automatically once connected to a mobile application"</div>
<div class="en"><b>4. What does "compatible" mean here?</b> A) Decorative B) <span class="hl3">Able to work with other devices ✅</span> C) Expensive</div>
<div style="color:#94a3b8;font-size:.78rem">compatible = متوافق = يشتغل مع أجهزة ثانية</div>
</div>

<h3>📖 قطعة القراءة 2 - Online Support System</h3>
<div class="enb"><div class="et">📖 Online Support System</div>
This online support system is designed to help users manage technical issues efficiently. It is suitable for individuals and organizations that require fast access to assistance. The system is available through a web interface and operates on standard internet browsers.<br><br>
The platform provides several support tools, including a ticket submission feature and a knowledge base. Users can describe their issues, upload screenshots, and track the status of their requests. The system supports automatic responses for common problems, which reduces response time.<br><br>
The interface is clear and reliable, allowing users to navigate easily between different sections. The system is equipped with security features to protect user data.</div>
<div class="ez">نظام دعم فني أونلاين: يساعد المستخدمين يحلون مشاكلهم التقنية. يقدر المستخدم يرسل طلب (ticket)، يرفع صور للمشكلة، ويتابع حالة طلبه. النظام يرد تلقائياً على المشاكل الشائعة عشان يوفر الوقت.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Reading 2 MCQs</div>
<div class="en"><b>1. What is the main function?</b> A) Device manufacturing B) <span class="hl3">Technical problem management ✅</span> C) Data storage</div>
<div style="color:#94a3b8;font-size:.78rem">الوظيفة الرئيسية = إدارة المشاكل التقنية</div>
<div class="en"><b>2. Which feature reduces response time?</b> A) Manual review B) <span class="hl3">Automatic responses ✅</span> C) User meetings</div>
<div style="color:#94a3b8;font-size:.78rem">الردود التلقائية تقلل وقت الاستجابة</div>
<div class="en"><b>3. What can users upload?</b> A) Audio files B) <span class="hl3">Screenshots ✅</span> C) Software updates</div>
<div style="color:#94a3b8;font-size:.78rem">"upload screenshots" = يرفعون صور شاشة</div>
<div class="en"><b>4. Why is the interface "clear"?</b> A) Many colors B) <span class="hl3">Allows easy navigation ✅</span> C) Requires training</div>
<div style="color:#94a3b8;font-size:.78rem">"clear and reliable, allowing users to navigate easily" = واضحة وسهلة التنقل</div>
</div>

</div>`;

sections.m5=`<div class="card">
<h2 style="color:#a78bfa">⚖️ Module 5: Comparisons + Data</h2>

<h3>📖 المفردات - Vocabulary</h3>
<div class="tw"><table>
<tr><th>Word</th><th>English Meaning</th><th>المعنى بالعربي</th></tr>
<tr><td><b>Similar</b></td><td>Almost the same</td><td>متشابه</td></tr>
<tr><td><b>Different</b></td><td>Not the same</td><td>مختلف</td></tr>
<tr><td><b>Higher / Lower</b></td><td>More / Less (in level)</td><td>أعلى / أقل</td></tr>
<tr><td><b>Faster / Slower</b></td><td>More / Less speed</td><td>أسرع / أبطأ</td></tr>
<tr><td><b>Increase</b></td><td>To go up; become more</td><td>يزداد / يرتفع</td></tr>
<tr><td><b>Decrease</b></td><td>To go down; become less</td><td>ينخفض / يقل</td></tr>
<tr><td><b>Average</b></td><td>The middle or typical value</td><td>متوسط</td></tr>
<tr><td><b>Percentage</b></td><td>Part of a whole (out of 100)</td><td>نسبة مئوية</td></tr>
<tr><td><b>Advantage</b></td><td>A good point; a benefit</td><td>ميزة / فائدة</td></tr>
<tr><td><b>Disadvantage</b></td><td>A bad point; a weakness</td><td>عيب / نقطة ضعف</td></tr>
<tr><td><b>Benefit</b></td><td>Something good you get</td><td>فائدة</td></tr>
<tr><td><b>Limitation</b></td><td>A restriction or weakness</td><td>قيد / محدودية</td></tr>
</table></div>

<h3>📗 القواعد - Comparatives & Superlatives المقارنة والتفضيل</h3>

<div class="cb"><div class="lb bl">🎯 Comparatives المقارنة (بين شيئين)</div>
<b>صفة قصيرة (1-2 مقطع):</b> نضيف <b>-er</b> + <b>than</b><br>
<span class="en">fast → fast<b>er than</b> | light → light<b>er than</b> | cheap → cheap<b>er than</b></span><br><br>
<b>صفة طويلة (3 مقاطع+):</b> نضيف <b>more</b> + <b>than</b><br>
<span class="en">expensive → <b>more</b> expensive <b>than</b> | powerful → <b>more</b> powerful <b>than</b></span></div>

<div class="cb o"><div class="lb or">🎯 Superlatives التفضيل (بين ثلاثة أو أكثر)</div>
<b>صفة قصيرة:</b> نضيف <b>the -est</b><br>
<span class="en">fast → <b>the</b> fast<b>est</b> | light → <b>the</b> light<b>est</b></span><br><br>
<b>صفة طويلة:</b> نضيف <b>the most</b><br>
<span class="en">expensive → <b>the most</b> expensive | powerful → <b>the most</b> powerful</span></div>

<div class="ez">المقارنة = تقارن بين شيئين فقط: "هذا الجوال <b>أسرع من</b> ذاك" ← faster <b>than</b><br>
التفضيل = تقارن بين 3 أو أكثر وتختار الأفضل: "هذا <b>الأسرع</b> بين الثلاثة" ← <b>the</b> fastest<br><br>
<b>حيلة سهلة:</b> صفة قصيرة (fast, big, cheap) ← أضف er/est. صفة طويلة (expensive, beautiful) ← أضف more/most.</div>

<div class="cb g"><div class="lb gr">✏️ تمارين محلولة</div>
<div class="en"><b>1.</b> App A is ______ App B. → <span class="hl3">faster than ✅</span> (مقارنة بين اثنين)</div>
<div class="en"><b>2.</b> Laptop X is ______ Laptop Y. → <span class="hl3">more expensive than ✅</span> (expensive طويلة)</div>
<div class="en"><b>3.</b> This tablet is ______ that tablet. → <span class="hl3">lighter than ✅</span></div>
<div class="en"><b>4.</b> Device B has ______ battery life. → <span class="hl3">the longest ✅</span> (تفضيل)</div>
</div>

<h3>📖 قطعة القراءة - Comparing Two Devices</h3>
<div class="enb"><div class="et">📖 Comparing Two Devices</div>
Device A is lighter and faster, suitable for mobile use. Device B is larger and heavier but provides stronger performance for long study sessions.<br><br>
Battery life: Device A operates for 8 hours, Device B for 12 hours. Device A charges more quickly. Device A is cheaper, Device B is more expensive due to higher performance.<br><br>
Overall: Device A is suitable for basic tasks. Device B is better for advanced academic use.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم</div>
<div class="en"><b>1. One advantage of Device A?</b> → <span class="hl3">B) Faster charging ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">ميزة جهاز A = يشحن أسرع (charges more quickly)</div>
<div class="en"><b>2. Which device is better for advanced use?</b> → <span class="hl3">B) Device B ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">جهاز B أفضل للاستخدام المتقدم لأن أداؤه أقوى</div>
</div>

<h3>📖 قطعة القراءة 2 - Describing Simple Data</h3>
<div class="enb"><div class="et">📖 Describing Simple Data</div>
A learning platform collected usage data from students over one month. The average daily usage was three hours. During exam weeks, the number increased to five hours per day, showing a clear increase in study time.<br><br>
The data also showed differences between weekdays and weekends. On weekdays, usage was higher, while on weekends it was lower. Approximately sixty percent of students used the platform daily, while forty percent used it occasionally.<br><br>
These numbers help instructors understand study habits and improve course planning.</div>
<div class="ez">منصة تعليمية جمعت بيانات استخدام الطلاب لمدة شهر: المتوسط اليومي 3 ساعات، لكن في أسابيع الاختبارات زاد إلى 5 ساعات! الاستخدام أعلى في أيام الدوام وأقل في نهاية الأسبوع. 60% من الطلاب يستخدمونها يومياً و 40% أحياناً.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Reading 2 MCQs</div>
<div class="en"><b>1. What happened to usage during exam weeks?</b> A) It decreased B) It stayed the same C) <span class="hl3">It increased ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">أسابيع الاختبارات: الاستخدام زاد من 3 إلى 5 ساعات (increased)</div>
<div class="en"><b>2. When was platform usage higher?</b> A) On weekends B) <span class="hl3">On weekdays ✅</span> C) During holidays</div>
<div style="color:#94a3b8;font-size:.78rem">أيام الدوام (weekdays) = استخدام أعلى</div>
<div class="en"><b>3. What percentage used the platform daily?</b> A) 40% B) 50% C) <span class="hl3">60% ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">"sixty percent of students used the platform daily" = 60%</div>
</div>

</div>`;

sections.m6=`<div class="card">
<h2 style="color:#fbbf24">📋 Module 6: Instructions & Processes</h2>

<h3>📖 المفردات - Vocabulary</h3>
<h3 style="color:#fbbf24;font-size:.85rem">Sequencing Language (كلمات الترتيب) ⭐</h3>
<div class="tw"><table>
<tr><th>Word</th><th>English Meaning</th><th>المعنى بالعربي</th><th>Usage</th></tr>
<tr><td><b>First</b></td><td>At the beginning</td><td>أولاً</td><td class="en">First, download the app.</td></tr>
<tr><td><b>Next</b></td><td>After that; the following step</td><td>بعد ذلك / ثانياً</td><td class="en">Next, open the file.</td></tr>
<tr><td><b>Then</b></td><td>After the previous step</td><td>ثم</td><td class="en">Then, enter your password.</td></tr>
<tr><td><b>After that</b></td><td>Following the previous action</td><td>بعد ذلك</td><td class="en">After that, click submit.</td></tr>
<tr><td><b>Finally</b></td><td>The last step</td><td>أخيراً</td><td class="en">Finally, restart the system.</td></tr>
</table></div>

<h3 style="color:#fbbf24;font-size:.85rem">Process & Action Vocabulary</h3>
<div class="vw">
<div class="vi"><b>Process</b> = a series of actions<div class="ar">عملية (سلسلة خطوات)</div></div>
<div class="vi"><b>Step</b> = one action in a process<div class="ar">خطوة</div></div>
<div class="vi"><b>Instruction</b> = tells you what to do<div class="ar">تعليمة / إرشاد</div></div>
<div class="vi"><b>Procedure</b> = a set of steps to follow<div class="ar">إجراء</div></div>
<div class="vi"><b>Method</b> = a way of doing something<div class="ar">طريقة / أسلوب</div></div>
<div class="vi"><b>Install</b> = to put software on a device<div class="ar">يُثبّت (برنامج)</div></div>
<div class="vi"><b>Activate</b> = to make something start working<div class="ar">يُفعّل</div></div>
<div class="vi"><b>Connect</b> = to join/link to something<div class="ar">يربط / يوصّل</div></div>
<div class="vi"><b>Submit</b> = to send for review<div class="ar">يُرسل / يُسلّم</div></div>
<div class="vi"><b>Complete</b> = to finish<div class="ar">يُكمل / يُنهي</div></div>
</div>

<h3>📗 القواعد - Imperatives صيغة الأمر</h3>
<div class="fm">Imperative = Base verb (start with the verb directly!)<small>
Download the file. ← حمّل الملف (ابدأ بالفعل مباشرة!)<br>
Open the application. ← افتح التطبيق<br>
Follow the instructions. ← اتبع التعليمات</small></div>
<div class="ez">صيغة الأمر = ابدأ بالفعل مباشرة بدون فاعل! بدل ما تقول "You should download" ← قل فقط "Download!" وهذا اللي نستخدمه في التعليمات والخطوات: "First, <b>open</b> the app. Next, <b>click</b> login. Then, <b>enter</b> your password."</div>

<div class="cb g"><div class="lb gr">✏️ أمثلة شاملة - Imperative Examples</div>
<div class="en"><b>Simple Imperatives (أوامر بسيطة):</b><br>
• <b>Download</b> the file from the website.<br>
• <b>Open</b> the application.<br>
• <b>Click</b> the login button.<br>
• <b>Enter</b> your username and password.<br>
• <b>Connect</b> your device to Wi-Fi.<br>
• <b>Install</b> the latest update.<br>
• <b>Restart</b> the system after installation.<br>
• <b>Upload</b> your assignment before the deadline.<br><br>
<b>With Sequencing Words (مع كلمات الترتيب):</b><br>
• <b>First</b>, open the official website.<br>
• <b>Next</b>, download the installation file.<br>
• <b>Then</b>, follow the on-screen instructions.<br>
• <b>After that</b>, activate the software.<br>
• <b>Finally</b>, restart the device.</div>
<div class="en" style="margin-top:.4rem"><b>Passive Voice for Processes (المبني للمجهول في العمليات):</b><br>
• The file <b>is uploaded</b> to the server.<br>
• The system <b>is activated</b> automatically.<br>
• The task <b>is completed</b> successfully.<br>
• The assignment <b>is submitted</b> online.</div>
</div>

<h3>📖 قطعة القراءة - Installing Software</h3>
<div class="enb"><div class="et">📖 Following Instructions</div>
Installing a software application usually involves several clear steps. <b>First</b>, users download the application from an official website. <b>Next</b>, they open the installation file and follow the on-screen instructions. <b>After</b> the installation is complete, users activate the software using an account or license key. <b>Finally</b>, the system checks the configuration to make sure the application works correctly.</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم</div>
<div class="en"><b>1. What is the first step?</b> → <span class="hl3">B) Downloading the application ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">أول خطوة = تحميل التطبيق من الموقع الرسمي</div>
<div class="en"><b>2. Why are clear instructions important?</b> → <span class="hl3">B) They reduce errors ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">التعليمات الواضحة تقلل الأخطاء وتوفر الوقت</div>
<div class="en"><b>3. What happens after installation?</b> → <span class="hl3">B) The software is activated ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">بعد التثبيت = تفعيل البرنامج بحساب أو مفتاح ترخيص</div>
</div>

<h3>📖 قطعة القراءة 2 - Submitting an Assignment</h3>
<div class="enb"><div class="et">📖 Describing a Process</div>
Submitting an online assignment requires following a simple procedure. <b>First</b>, students log into the learning platform using their username and password. <b>Next</b>, they select the correct course and open the assignment page.<br><br>
<b>After that</b>, students upload the required file and check that it is complete. <b>Finally</b>, they submit the assignment and wait for confirmation. If any step is skipped, the submission may fail.<br><br>
Understanding the process helps students avoid mistakes and submit work successfully.</div>
<div class="ez">خطوات تسليم واجب أونلاين: أولاً سجّل دخول بالاسم والرقم السري، ثم اختر المقرر الصحيح وافتح صفحة الواجب، بعدها ارفع الملف المطلوب وتأكد إنه كامل، وأخيراً اضغط تسليم وانتظر رسالة التأكيد. إذا نسيت خطوة ← التسليم ممكن يفشل!</div>

<div class="cb g"><div class="lb gr">أسئلة الفهم - Reading 2 MCQs</div>
<div class="en"><b>1. What must students do first?</b> A) Upload the file B) <span class="hl3">Log into the platform ✅</span> C) Submit the assignment</div>
<div style="color:#94a3b8;font-size:.78rem">أول خطوة = تسجيل الدخول للمنصة (log into)</div>
<div class="en"><b>2. What happens if a step is skipped?</b> A) The grade improves B) <span class="hl3">The submission may fail ✅</span> C) The file is saved automatically</div>
<div style="color:#94a3b8;font-size:.78rem">إذا تخطيت خطوة = التسليم ممكن يفشل!</div>
<div class="en"><b>3. What is the final step?</b> A) Uploading the file B) Selecting the course C) <span class="hl3">Submitting the assignment ✅</span></div>
<div style="color:#94a3b8;font-size:.78rem">آخر خطوة = تسليم الواجب (submit) وانتظار التأكيد</div>
</div>

</div>`;

sections.rev=`<div class="card">
<h2 style="color:#fbbf24">📚 Comprehensive Grammar & Vocabulary Review</h2>
<h2 style="color:#94a3b8;font-size:.85rem">مراجعة شاملة للقواعد والمفردات</h2>

<h3 style="color:#38bdf8">━━━ PART 1: GRAMMAR REVIEW ━━━</h3>

<h3>1️⃣ Present Simple Tense</h3>
<div class="cb"><div class="lb bl">Rules (القواعد)</div>
<div class="en">
<b>USE:</b> To describe facts, routines, and processes that are always true.<br><br>
<b>AFFIRMATIVE (إثبات):</b><br>
• I / You / We / They + <b>base verb</b> → They <b>use</b> AI every day.<br>
• He / She / It + <b>verb + s/es</b> → The system <b>generates</b> answers.<br><br>
<b>NEGATIVE (نفي):</b><br>
• I / You / We / They + <b>do not (don't)</b> + base verb → They <b>don't understand</b> feelings.<br>
• He / She / It + <b>does not (doesn't)</b> + base verb → AI <b>doesn't replace</b> teachers.<br><br>
<b>YES/NO QUESTIONS (أسئلة نعم/لا):</b><br>
• <b>Do</b> + I/you/we/they + base verb? → <b>Do</b> students <b>use</b> apps?<br>
• <b>Does</b> + he/she/it + base verb? → <b>Does</b> AI <b>help</b> students?<br><br>
<b>WH- QUESTIONS (أسئلة استفهامية):</b><br>
• WH-word + do/does + subject + base verb?<br>
• What <b>does</b> the model <b>generate</b>?<br>
• Why <b>do</b> students <b>use</b> AI tools?
</div></div>
<div class="ez">المضارع البسيط = الشيء اللي يصير دائماً أو كحقيقة ثابتة.<br>
مع he/she/it ← أضف <b>s</b> للفعل (generates, uses, helps)<br>
في النفي والسؤال ← الفعل يرجع <b>بدون s</b> (doesn't generate, Does AI help)<br>
<b>أكثر خطأ شائع:</b> Does AI help<b>s</b>? ❌ ← الصح: Does AI help? ✅</div>

<div class="tw"><table>
<tr><th>Type</th><th>he/she/it</th><th>I/you/we/they</th></tr>
<tr><td>Affirmative</td><td class="en">AI <b>generates</b> text</td><td class="en">Students <b>use</b> apps</td></tr>
<tr><td>Negative</td><td class="en">AI <b>doesn't generate</b></td><td class="en">Students <b>don't use</b></td></tr>
<tr><td>Question</td><td class="en"><b>Does</b> AI <b>generate</b>?</td><td class="en"><b>Do</b> students <b>use</b>?</td></tr>
<tr><td>WH-Question</td><td class="en">What <b>does</b> AI <b>generate</b>?</td><td class="en">Why <b>do</b> students <b>use</b>?</td></tr>
</table></div>

<div class="cb g"><div class="lb gr">✏️ More Sentence Examples</div>
<div class="en">
1. The chatbot <b>answers</b> questions quickly. (it → +s)<br>
2. AI <b>doesn't make</b> perfect decisions. (negative: doesn't + base)<br>
3. <b>Does</b> the app <b>recognize</b> voices? Yes, it does. (question: Does + base)<br>
4. Students <b>write</b> prompts every day. (they → no s)<br>
5. We <b>don't use</b> AI for cooking. (negative: don't + base)<br>
6. <b>Do</b> teachers <b>use</b> AI platforms? Yes, they do.<br>
7. <b>What does</b> the system <b>produce</b>? It produces reports.<br>
8. <b>How do</b> students <b>learn</b> with AI? They use chatbots.
</div></div>

<h3>2️⃣ Passive Voice</h3>
<div class="cb"><div class="lb bl">Rules (القواعد)</div>
<div class="en">
<b>USE:</b> When the doer is not important. Focus is on the action or the object.<br><br>
<b>FORM:</b> Subject + <b>is/are</b> + <b>past participle</b> (V3)<br><br>
<b>is</b> → singular subjects (data, the update, the issue)<br>
<b>are</b> → plural subjects (updates, files, errors)<br><br>
<b>EXAMPLES:</b><br>
• Data <b>is stored</b> in the cloud.<br>
• Updates <b>are installed</b> automatically.<br>
• The issue <b>is fixed</b> by the technician.<br>
• Errors <b>are detected</b> by the system.
</div></div>
<div class="ez">المبني للمجهول = الشيء "انسوى" بدون ما نذكر مين سواه.<br>
مفرد ← <b>is</b> + التصريف الثالث (Data <b>is stored</b>)<br>
جمع ← <b>are</b> + التصريف الثالث (Updates <b>are installed</b>)</div>

<div class="cb g"><div class="lb gr">Active → Passive Conversion (تحويل سريع)</div>
<div class="tw"><table>
<tr><th>Active</th><th>Passive</th></tr>
<tr><td class="en">The system <b>processes</b> data.</td><td class="en">Data <b>is processed</b>.</td></tr>
<tr><td class="en">The OS <b>manages</b> settings.</td><td class="en">Settings <b>are managed</b>.</td></tr>
<tr><td class="en">The app <b>stores</b> files.</td><td class="en">Files <b>are stored</b>.</td></tr>
<tr><td class="en">The technician <b>fixes</b> the issue.</td><td class="en">The issue <b>is fixed</b>.</td></tr>
<tr><td class="en">The system <b>detects</b> errors.</td><td class="en">Errors <b>are detected</b>.</td></tr>
<tr><td class="en">The OS <b>installs</b> updates.</td><td class="en">Updates <b>are installed</b>.</td></tr>
</table></div></div>

<h3>3️⃣ Adjectives & Descriptive Phrases</h3>
<div class="cb"><div class="lb bl">Rules (القواعد)</div>
<div class="en">
<b>RULE 1:</b> Adjectives come <b>BEFORE</b> nouns in English.<br>
• a <b>compact</b> model ✅ (NOT: a model compact ❌)<br>
• a <b>durable</b> material ✅<br>
• a <b>portable</b> device ✅<br><br>
<b>RULE 2:</b> Descriptive phrases come <b>AFTER</b> the noun.<br>
• a device <b>designed for</b> daily use ✅<br>
• a system <b>equipped with</b> sensors ✅<br>
• a model <b>compatible with</b> smartphones ✅<br><br>
<b>RULE 3:</b> Use adjectives (NOT nouns) before nouns.<br>
• a portable and <b>reliable</b> system ✅ (reliable = adjective)<br>
• a portable and <b>reliability</b> system ❌ (reliability = noun!)
</div></div>
<div class="ez">في الإنجليزي: الصفة <b>قبل</b> الاسم (compact model). في العربي العكس (موديل صغير).<br>

<h3>4️⃣ Comparatives & Superlatives</h3>
<div class="cb"><div class="lb bl">Rules (القواعد)</div>
<div class="en">
<b>COMPARATIVES</b> (comparing TWO things):<br>
• Short adjective + <b>-er than</b>: fast → fast<b>er than</b> | cheap → cheap<b>er than</b><br>
• Long adjective: <b>more</b> + adj + <b>than</b>: expensive → <b>more</b> expensive <b>than</b><br><br>
<b>SUPERLATIVES</b> (comparing THREE or more):<br>
• Short adjective: <b>the</b> + adj + <b>-est</b>: fast → <b>the</b> fast<b>est</b><br>
• Long adjective: <b>the most</b> + adj: expensive → <b>the most</b> expensive
</div></div>
<div class="ez">مقارنة بين 2 ← -er than (أو more...than للصفات الطويلة)<br>
تفضيل بين 3+ ← the -est (أو the most للصفات الطويلة)</div>

<div class="cb g"><div class="lb gr">✏️ أمثلة شاملة - Comparative & Superlative Examples</div>
<div class="en"><b>Comparatives (بين شيئين):</b><br>

• Device B is <b>heavier than</b> Device A.<br>
• Laptop X is <b>more expensive than</b> Laptop Y.<br>
• This app is <b>more powerful than</b> that one.<br>
• Device A charges <b>more quickly than</b> Device B.<br>
• Battery life is <b>longer than</b> expected.<br><br>
<b>Superlatives (بين 3 أو أكثر):</b><br>
• Device C has <b>the longest</b> battery life.<br>
• This is <b>the fastest</b> model available.<br>
• It is <b>the cheapest</b> option for students.<br>
• This is <b>the most expensive</b> device in the store.<br>
• It has <b>the most powerful</b> processor.</div>
</div>

<h3>5️⃣ Imperatives (Commands & Instructions)</h3>
<div class="cb"><div class="lb bl">Rules (القواعد)</div>
<div class="en">
<b>USE:</b> To give instructions, orders, or directions.<br><br>
<b>FORM:</b> Start directly with the <b>base verb</b>. No subject needed!<br><br>
• <b>Download</b> the file. ✅ (NOT: You download the file.)<br>
• <b>Open</b> the application. ✅<br>

<b>WITH SEQUENCING WORDS:</b><br>

• <b>Next</b>, open the file.<br>

• <b>After that</b>, click submit.<br>
• <b>Finally</b>, restart the system.
</div></div>

<div class="cb g"><div class="lb gr">✏️ Complete Process Example</div>

3. <b>Then</b>, <b>open</b> the assignment page.<br>
4. <b>After that</b>, <b>upload</b> the required file.<br>
5. <b>Finally</b>, <b>click</b> the submit button and <b>wait</b> for confirmation.<br><br>
<b>Passive version of the same process:</b><br>

2. The correct course <b>is selected</b>.<br>
3. The file <b>is uploaded</b> to the assignment page.<br>

<b>5. Adjective BEFORE noun:</b><br>

<b>6. Descriptive phrase AFTER noun:</b><br>

sections.quiz='<div class="sb"><div class="sn2" id="scoreDisp">0 / '+Q.length+'</div><button class="rb" onclick="resetQuiz()">🔄 Reset</button></div><div id="qContainer"></div>';
let answers={};
function initQuiz(){answers={};const c=document.getElementById('qContainer');if(!c)return;c.innerHTML='';Q.forEach((q,i)=>{const d=document.createElement('div');d.className='qc';d.innerHTML='<h4>Q'+(i+1)+': '+q.q+'</h4><div id="opts'+i+'">'+q.o.map((o,j)=>'<div class="qo" onclick="checkA('+i+','+j+')" id="o'+i+'_'+j+'">'+String.fromCharCode(65+j)+') '+o+'</div>').join('')+'</div><div class="qe" id="exp'+i+'">'+q.e+'</div>';c.appendChild(d)});updateScore();}
window.checkA=function(qi,oi){if(answers[qi]!==undefined)return;answers[qi]=oi;const correct=Q[qi].c;const exp=document.getElementById('exp'+qi);document.querySelectorAll('#opts'+qi+' .qo').forEach(o=>o.classList.add('d'));if(oi===correct){document.getElementById('o'+qi+'_'+oi).classList.add('ok');exp.className='qe s ok';exp.innerHTML='✅ '+Q[qi].e;}else{document.getElementById('o'+qi+'_'+oi).classList.add('no');document.getElementById('o'+qi+'_'+correct).classList.add('ok');exp.className='qe s no';exp.innerHTML='❌ '+Q[qi].e;}updateScore();};
function updateScore(){const s=Object.entries(answers).filter(([k,v])=>v===Q[k].c).length;const el=document.getElementById('scoreDisp');if(el)el.textContent=s+' / '+Q.length;}
window.resetQuiz=function(){answers={};initQuiz();window.scrollTo({top:0,behavior:'smooth'});};

render();
</script>
